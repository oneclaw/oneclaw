# 发布工作流：上传 latest yml + 刷新 CDN
# 触发：GitHub Release 从 Draft 发布为 Published
# 二进制产物已在 build-release 阶段预上传到 TOS，此处只推送更新清单

name: Publish Release

on:
  release:
    types: [published]

env:
  CDN_DOMAIN: oneclaw.cn

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # 从 Release 下载 latest yml 文件
      - name: 下载 Release 产物
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out/release
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.yml" \
            --dir out/release

      # 上传 latest yml 到 TOS（触发 auto-updater 发现新版本）
      - name: 安装 tosutil
        run: |
          curl -fsSL -o tosutil https://m645b3e1bb36e-mrap.mrap.accesspoint.tos-global.volces.com/linux/amd64/tosutil
          chmod +x tosutil

      - name: 上传 latest yml 到 TOS
        env:
          VOLCENGINE_ACCESS_KEY: ${{ secrets.VOLCENGINE_ACCESS_KEY }}
          VOLCENGINE_SECRET_KEY: ${{ secrets.VOLCENGINE_SECRET_KEY }}
        run: |
          ./tosutil config -i "$VOLCENGINE_ACCESS_KEY" -k "$VOLCENGINE_SECRET_KEY" -e tos-cn-beijing.volces.com -re cn-beijing
          ./tosutil cp out/release/ tos://oneclaw-cn/releases/ -r -f --include "*.yml"
          echo "latest yml 上传完成"

      # 刷新 CDN 缓存
      - name: 刷新 CDN 缓存
        env:
          VOLCENGINE_ACCESS_KEY: ${{ secrets.VOLCENGINE_ACCESS_KEY }}
          VOLCENGINE_SECRET_KEY: ${{ secrets.VOLCENGINE_SECRET_KEY }}
        run: |
          node scripts/volcengine-cdn-refresh.js \
            "https://oneclaw.cn/releases/latest-mac.yml" \
            "https://oneclaw.cn/releases/latest.yml"
          echo "CDN 缓存刷新已提交"
