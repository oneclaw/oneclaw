appId: com.oneclaw.app
productName: OneClaw
copyright: Copyright © 2025 OneClaw

directories:
  output: out

files:
  - dist/**/*
  - chat-ui/dist/**/*
  - live2d/**/*
  - setup/**/*
  - settings/**/*
  - assets/**/*
  - resources/live2d/**/*
  - package.json

# sherpa-onnx / naudiodon2 的 native .node 文件需要解出 asar
asarUnpack:
  - "node_modules/sherpa-onnx-node/**/*"
  - "node_modules/sherpa-onnx-darwin-*/**/*"
  - "node_modules/sherpa-onnx-win-*/**/*"
  - "node_modules/sherpa-onnx-linux-*/**/*"
  - "node_modules/naudiodon2/**/*"

# Live2D 模型和语音模型放到 extraResources（不打入 asar，大文件直接复制）
extraResources:
  - from: resources/models/
    to: resources/models/
    filter:
      - "**/*"

# afterPack 钩子：绕过 node_modules 剥离，直接注入 resources/ 到 app bundle
afterPack: ./scripts/afterPack.js

# --- macOS ---
mac:
  target:
    - dmg   # 手动分发
    - zip   # 自动更新（electron-updater 在 macOS 上要求 zip）
  icon: assets/icon.icns
  category: public.app-category.productivity
  # zip artifactName 含 arch + -mac 后缀，供 electron-updater findFile 按架构匹配
  # dmg.artifactName 会覆盖 DMG 的命名
  artifactName: "OneClaw-${version}-${arch}-mac.${ext}"
  # 签名身份由 CSC_NAME 环境变量指定（见 .env），避免把证书名写入仓库
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true

# 自动更新：指向阿里云 CDN
publish:
  provider: generic
  url: https://oneclaw.cn/releases/

dmg:
  sign: false
  # 关闭 DMG 差分更新元数据，避免生成 .dmg.blockmap
  writeUpdateInfo: false
  artifactName: "OneClaw-${version}-${arch}.${ext}"

# --- Windows ---
win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  # 安装前强制终止旧进程，避免托盘模式下 WM_CLOSE 被拦截
  include: "scripts/installer.nsh"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  # 关闭 NSIS 差分包，避免生成 .exe.blockmap
  differentialPackage: false
  artifactName: "OneClaw-Setup-${version}-${arch}.${ext}"
